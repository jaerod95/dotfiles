set -g prefix C-a
set -s focus-events on
set -s escape-time 10
set -sg repeat-time 600
set -g monitor-activity on
set -g visual-activity off
set -g display-panes-time 4000

set -g history-limit 50000
set -g mouse on

set -g default-terminal "screen-256color"
set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows
setw -g automatic-rename on  # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed
set -g set-titles on          # set terminal title
set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time
setw -g xterm-keys on
setw -qg utf8 on

# Start session indexes at 1 instead of zero and order by name for consistent jumping
bind -N "Choose session tree" -T prefix s choose-tree -sZ -O name -K "#{?#{e|<:#{line},9},#{e|+:#{line},1},#{?#{e|<:#{line},36},M-#{a:#{e|+:97,#{e|-:#{line},10}}},}}"

tmux_conf_new_window_retain_current_path=false
tmux_conf_new_pane_retain_current_path=true
tmux_conf_new_pane_reconnect_ssh=false
tmux_conf_new_session_prompt=false

set-option -g default-shell /bin/zsh

bind -N "Reload tmux config" r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'
bind -N "Clear screen and history" -n C-k send-keys -R \; send-keys C-l \; send-keys C-? \; clear-history
bind -N "Clear screen and history" -n C-Up send-keys -R \; send-keys C-l \; send-keys C-? \; clear-history
bind -N "New session" C-c new-session
bind -N "Open Node debugger" -r i run-shell "tmux neww ~/.dotfiles/zsh/scripts/open-node-debugger.sh"
bind -N "Fuzzy find tmux session" -n C-f run-shell "tmux neww ~/.dotfiles/zsh/scripts/open-tmux-session.sh"
bind -N "Open pane output in nvim" -n C-e run-shell "rm /tmp/tmux.log" \;\
       run-shell "tmux capture-pane -pJ -S- -E-|sed -E 's| *$||' >/tmp/tmux.log" \;\
       neww bash -ic "nvim -u ~/.config/nvim/init.lua /tmp/tmux.log"

bind -N "Search keybindings" ? display-popup -E -w 80% -h 70% "~/.dotfiles/zsh/scripts/tmux-keybindings.sh"

bind -N "Split pane horizontal" - split-window -v
bind -N "Split pane vertical" / split-window -h
bind -N "Switch to last session" f switch-client -l

bind -N "Select pane left" -r h select-pane -L
bind -N "Select pane down" -r j select-pane -D
bind -N "Select pane up" -r k select-pane -U
bind -N "Select pane right" -r l select-pane -R
bind -N "Swap pane down" > swap-pane -D
bind -N "Swap pane up" < swap-pane -U
unbind n
unbind p
bind -N "Previous window" -r C-h previous-window
bind -N "Next window" -r C-l next-window
bind -N "Previous window" -r Left previous-window
bind -N "Next window" -r Right next-window
bind -N "Join pane from last window" -r @ "join-pane -s !"
bind -N "Last active window" Tab last-window

# pane resizing
bind -N "Resize pane left" -r H resize-pane -L 2
bind -N "Resize pane down" -r J resize-pane -D 2
bind -N "Resize pane up" -r K resize-pane -U 2
bind -N "Resize pane right" -r L resize-pane -R 2

bind -N "Enter copy mode" Enter copy-mode

# copy to macOS clipboard
if -b 'command -v pbcopy > /dev/null 2>&1' 'bind -N "Copy buffer to clipboard" y run -b "tmux save-buffer - | pbcopy"'
if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' 'bind -N "Copy buffer to clipboard" y run -b "tmux save-buffer - | reattach-to-user-namespace pbcopy"'
# copy to X11 clipboard
if -b 'command -v xsel > /dev/null 2>&1' 'bind -N "Copy buffer to clipboard" y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind -N "Copy buffer to clipboard" y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'

if '[ -f ~/.tmux.conf.local ]' 'source ~/.tmux.conf.local'

# copy-mode-vi overrides
bind -N "Begin selection" -T copy-mode-vi v send -X begin-selection
bind -N "Toggle rectangle selection" -T copy-mode-vi C-v send -X rectangle-toggle
bind -N "Copy selection and cancel" -T copy-mode-vi y send -X copy-selection-and-cancel
bind -N "Cancel copy mode" -T copy-mode-vi Escape send -X cancel
bind -N "Start of line" -T copy-mode-vi H send -X start-of-line
bind -N "End of line" -T copy-mode-vi L send -X end-of-line

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #T"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status on
set -g status-position top
set -qg status-utf8 on
set -g status-interval 10     # redraw status line every 10 seconds
set -g status-style bg=default
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-battery/battery.tmux

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Ataraxy-Labs/opensessions'

# TPM init — keep at bottom
run '~/.tmux/plugins/tpm/tpm'
